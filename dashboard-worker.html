<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Field Worker Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="flex justify-between items-center px-10 py-4 bg-white shadow">
  <img src="LOGO.png" class="w-32">
  <button onclick="logout()" class="text-gray-600 hover:text-black">
    Logout
  </button>
</nav>


<div class="p-10">

  <!-- Title -->
  <h1 class="text-3xl font-bold mb-8">Submit Need</h1>

  <!-- AI Section -->
  <div class="bg-blue-50 border border-blue-200 p-6 rounded-xl mb-8">

    <div class="flex items-center gap-2 mb-2">
      <span class="text-blue-600 font-semibold">✨ AI-Assisted Input</span>
      <span class="bg-blue-600 text-white text-xs px-2 py-1 rounded-full">AI Powered</span>
    </div>

    <p class="text-gray-600 mb-4">
      Describe the situation and let AI auto-fill the form details
    </p>

    <div class="flex gap-4">
      <input type="text" id="aiInput"
        placeholder="E.g., Urgent medical supplies needed at North District..."
        class="flex-1 p-3 border rounded-lg">

      <button onclick="autoFill()"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
        ✨ Auto Fill
      </button>
    </div>

  </div>

  <!-- Form -->
  <div class="bg-white p-8 rounded-xl shadow">

    <!-- Title -->
    <div class="mb-4">
      <label class="block mb-1">Title</label>
      <input id="title"
        class="w-full p-3 border rounded-lg"
        placeholder="Enter short title">
    </div>

    <!-- Zone -->
    <div class="mb-4">
      <label class="block mb-1">Zone</label>
      <select id="zone" class="w-full p-3 border rounded-lg">
        <option value="">Select zone</option>
        <option>North District</option>
        <option>South District</option>
        <option>East District</option>
        <option>West District</option>
      </select>
    </div>

    <!-- Category -->
    <div class="mb-4">
      <label class="block mb-1">Category</label>
      <select id="category" class="w-full p-3 border rounded-lg">
        <option value="">Select category</option>
        <option>Medical</option>
        <option>Food</option>
        <option>Shelter</option>
      </select>
    </div>

    <!-- Description -->
    <div class="mb-4">
      <label class="block mb-1">Description</label>
      <textarea id="description"
        class="w-full p-3 border rounded-lg h-28"
        placeholder="Describe the need in detail..."></textarea>
    </div>

    <!-- Urgency -->
    <div class="mb-6">
      <label class="block mb-2">Urgency Level</label>

      <div class="space-y-2">
        <label class="flex items-center gap-2">
          <input type="radio" name="urgency" value="Critical">
          <span class="text-red-500">●</span> Critical
        </label>

        <label class="flex items-center gap-2">
          <input type="radio" name="urgency" value="High">
          <span class="text-orange-500">●</span> High
        </label>

        <label class="flex items-center gap-2">
          <input type="radio" name="urgency" value="Medium" checked>
          <span class="text-yellow-500">●</span> Medium
        </label>

        <label class="flex items-center gap-2">
          <input type="radio" name="urgency" value="Low">
          <span class="text-green-500">●</span> Low
        </label>
      </div>
    </div>

    <!-- Submit -->
    <button onclick="submitNeed()"
      class="w-full bg-blue-600 text-white py-3 rounded-xl text-lg hover:bg-blue-700">
      Submit Need
    </button>

  </div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// ✨ AI AUTO FILL
window.autoFill = function () {

  const text = document.getElementById("aiInput").value.toLowerCase();

  if(!text){
    alert("Write something first");
    return;
  }

  // Category
  if(text.includes("medical")) document.getElementById("category").value = "Medical";
  if(text.includes("food")) document.getElementById("category").value = "Food";
  if(text.includes("shelter")) document.getElementById("category").value = "Shelter";

  // Zone
  if(text.includes("north")) document.getElementById("zone").value = "North District";
  if(text.includes("south")) document.getElementById("zone").value = "South District";
  if(text.includes("east")) document.getElementById("zone").value = "East District";
  if(text.includes("west")) document.getElementById("zone").value = "West District";

  // Urgency
  if(text.includes("urgent") || text.includes("critical")){
    document.querySelector('input[value="Critical"]').checked = true;
  }
  else if(text.includes("high")){
    document.querySelector('input[value="High"]').checked = true;
  }

  // Description
  document.getElementById("description").value = text;

};


// 🚀 SUBMIT NEED (REAL FIREBASE)
window.submitNeed = async function(){

  const title = document.getElementById("title").value;
  const zone = document.getElementById("zone").value;
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value;
  const urgency = document.querySelector('input[name="urgency"]:checked')?.value;

  if(!title || !zone || !category || !description){
    alert("Please fill all fields");
    return;
  }

  try {

    await addDoc(collection(db, "needs"), {
      title,
      zone,
      category,
      description,
      urgency,
      status: "open",
      createdAt: new Date()
    });

    alert("Need submitted successfully ✅");

    // reset form
    document.getElementById("title").value = "";
    document.getElementById("zone").value = "";
    document.getElementById("category").value = "";
    document.getElementById("description").value = "";

  } catch(e){
    alert("Error: " + e.message);
  }

};


// 🔐 LOGOUT
window.logout = function(){
  localStorage.clear();
  window.location.href = "role.html";
};

</script>
